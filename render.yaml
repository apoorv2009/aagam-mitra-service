services:
  - type: web
    name: aagam-mitra
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: jain-texts
      - key: ADMIN_SERVICE_URL
        sync: false
      - key: REGISTRATION_SERVICE_URL
        sync: false
